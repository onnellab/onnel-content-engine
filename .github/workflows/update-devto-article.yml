name: Update Dev.to Article

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/update-devto-article.yml
      - data/app_pricing.csv
      - data/ai_provider_pricing.csv
      - data/melivra_ai_credit_policy.csv
      - generated/syndication/devto/**
      - scripts/build_manual_publish_site.py
      - scripts/sync_ai_provider_pricing.py
      - scripts/generate_syndication_drafts.py
      - scripts/update_devto_article.py
      - scripts/validate_syndication_drafts.py
  workflow_dispatch:
    inputs:
      topic_id:
        description: Topic id to update
        required: true
        default: TOPIC-0001
      language:
        description: Draft language
        required: true
        default: en

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      HOMEPAGE_REPO_PATH: .homepage
    steps:
      - name: Checkout content engine
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ONNELLAB_GITHUB_PAGES_TOKEN || github.token }}
      - name: Checkout homepage
        uses: actions/checkout@v4
        with:
          repository: onnellab/onnellab.github.io
          path: ${{ env.HOMEPAGE_REPO_PATH }}
          token: ${{ secrets.ONNELLAB_GITHUB_PAGES_TOKEN || github.token }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Update existing Dev.to article
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          TOPIC_ID: ${{ github.event.inputs.topic_id || 'TOPIC-0001' }}
          LANGUAGE: ${{ github.event.inputs.language || 'en' }}
        run: |
          python3 scripts/update_devto_article.py \
            --topic-id "$TOPIC_ID" \
            --language "$LANGUAGE"
      - name: Rebuild manual publish dashboard
        run: |
          npm install playwright
          npx playwright install chromium --with-deps
          python3 scripts/sync_ai_provider_pricing.py
          python3 scripts/build_manual_publish_site.py --homepage-repo "$HOMEPAGE_REPO_PATH"
      - name: Commit updated publication state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ai_provider_pricing_status.json generated/syndication/manifest.json generated/manual-publish/index.html generated/manual-publish/manifest.webmanifest generated/manual-publish/sw.js generated/manual-publish/icon-180.png generated/manual-publish/icon-192.png generated/manual-publish/icon-512.png
          if git diff --cached --quiet; then
            echo "No generated state changes"
          else
            git commit -m "Update Dev.to published article state"
            git push
          fi
      - name: Deploy manual publish dashboard
        run: |
          mkdir -p "$HOMEPAGE_REPO_PATH/public/manual-publish"
          cp generated/manual-publish/index.html "$HOMEPAGE_REPO_PATH/public/manual-publish/index.html"
          cp generated/manual-publish/manifest.webmanifest "$HOMEPAGE_REPO_PATH/public/manual-publish/manifest.webmanifest"
          cp generated/manual-publish/sw.js "$HOMEPAGE_REPO_PATH/public/manual-publish/sw.js"
          cp generated/manual-publish/icon-180.png "$HOMEPAGE_REPO_PATH/public/manual-publish/icon-180.png"
          cp generated/manual-publish/icon-192.png "$HOMEPAGE_REPO_PATH/public/manual-publish/icon-192.png"
          cp generated/manual-publish/icon-512.png "$HOMEPAGE_REPO_PATH/public/manual-publish/icon-512.png"
          cp generated/manual-publish/libsodium-sumo.js "$HOMEPAGE_REPO_PATH/public/manual-publish/libsodium-sumo.js"
          cp generated/manual-publish/libsodium-wrappers.js "$HOMEPAGE_REPO_PATH/public/manual-publish/libsodium-wrappers.js"
          git -C "$HOMEPAGE_REPO_PATH" config user.name "github-actions[bot]"
          git -C "$HOMEPAGE_REPO_PATH" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$HOMEPAGE_REPO_PATH" add public/manual-publish/index.html public/manual-publish/manifest.webmanifest public/manual-publish/sw.js public/manual-publish/icon-180.png public/manual-publish/icon-192.png public/manual-publish/icon-512.png public/manual-publish/libsodium-sumo.js public/manual-publish/libsodium-wrappers.js
          if git -C "$HOMEPAGE_REPO_PATH" diff --cached --quiet; then
            echo "No manual publish dashboard changes to deploy"
          else
            git -C "$HOMEPAGE_REPO_PATH" commit -m "Refresh manual publish dashboard"
            git -C "$HOMEPAGE_REPO_PATH" pull --rebase origin main
            git -C "$HOMEPAGE_REPO_PATH" push origin HEAD:main
          fi
