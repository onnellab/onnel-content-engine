name: ONNELLAB Verify Manual Publications

on:
  workflow_dispatch:
    inputs:
      visual_public_pages:
        description: "Inspect public Twitter/LinkedIn profile pages with Playwright"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  verify:
    name: Verify manual publication completion
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      HOMEPAGE_REPO_PATH: .homepage

    steps:
      - name: Checkout content engine
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ONNELLAB_GITHUB_PAGES_TOKEN || github.token }}

      - name: Checkout homepage
        uses: actions/checkout@v4
        with:
          repository: onnellab/onnellab.github.io
          path: ${{ env.HOMEPAGE_REPO_PATH }}
          token: ${{ secrets.ONNELLAB_GITHUB_PAGES_TOKEN || github.token }}

      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Configure Node
        if: inputs.visual_public_pages == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Playwright
        if: inputs.visual_public_pages == 'true'
        run: |
          set -euo pipefail
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Verify manual publications
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          DEVTO_USERNAME: ${{ secrets.DEVTO_USERNAME }}
          MEDIUM_RSS_URL: ${{ secrets.MEDIUM_RSS_URL }}
          MEDIUM_USERNAME: ${{ secrets.MEDIUM_USERNAME }}
          HASHNODE_RSS_URL: ${{ secrets.HASHNODE_RSS_URL }}
          HASHNODE_BLOG_URL: ${{ secrets.HASHNODE_BLOG_URL }}
          X_PUBLIC_PROFILE_URL: ${{ secrets.X_PUBLIC_PROFILE_URL || 'https://x.com/onnellab' }}
          X_USERNAME: ${{ secrets.X_USERNAME }}
          LINKEDIN_PUBLIC_PROFILE_URL: ${{ secrets.LINKEDIN_PUBLIC_PROFILE_URL || 'https://www.linkedin.com/in/onnel-lab-b5b9b0421/' }}
          LINKEDIN_PROFILE_URL: ${{ secrets.LINKEDIN_PROFILE_URL }}
        run: |
          set -euo pipefail
          if [ "${{ inputs.visual_public_pages }}" = "true" ]; then
            python3 scripts/verify_manual_publications.py --visual-public-pages
          else
            python3 scripts/verify_manual_publications.py
          fi

      - name: Commit verified state
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/manual_publish_state.json
          if git diff --cached --quiet; then
            echo "No manual publication state changes to commit"
          else
            git commit -m "Update verified manual publication state"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Build manual publish dashboard
        run: |
          set -euo pipefail
          python3 scripts/build_manual_publish_site.py --homepage-repo "$HOMEPAGE_REPO_PATH"

      - name: Deploy manual publish dashboard
        run: |
          set -euo pipefail
          mkdir -p "$HOMEPAGE_REPO_PATH/public/manual-publish"
          cp generated/manual-publish/index.html "$HOMEPAGE_REPO_PATH/public/manual-publish/index.html"
          cp generated/manual-publish/manifest.webmanifest "$HOMEPAGE_REPO_PATH/public/manual-publish/manifest.webmanifest"
          cp generated/manual-publish/sw.js "$HOMEPAGE_REPO_PATH/public/manual-publish/sw.js"
          git -C "$HOMEPAGE_REPO_PATH" config user.name "github-actions[bot]"
          git -C "$HOMEPAGE_REPO_PATH" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$HOMEPAGE_REPO_PATH" add public/manual-publish/index.html public/manual-publish/manifest.webmanifest public/manual-publish/sw.js
          if git -C "$HOMEPAGE_REPO_PATH" diff --cached --quiet; then
            echo "No manual publish dashboard changes to deploy"
          else
            git -C "$HOMEPAGE_REPO_PATH" commit -m "Refresh manual publish dashboard"
            git -C "$HOMEPAGE_REPO_PATH" pull --rebase origin main
            git -C "$HOMEPAGE_REPO_PATH" push origin HEAD:main
          fi
