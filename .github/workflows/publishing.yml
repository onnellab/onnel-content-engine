name: ONNELLAB Publishing Pipeline

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run validation, generation, and build without deployment"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"

jobs:
  publishing:
    name: Validate, generate, build, and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || github.event_name == 'push' && 'true' || 'false' }}
      SITE_URL: https://onnelakin.github.io/
      HOMEPAGE_REPO_PATH: .homepage

    steps:
      - name: Checkout content engine
        uses: actions/checkout@v4

      - name: Checkout homepage
        uses: actions/checkout@v4
        with:
          repository: onnelakin/onnelakin.github.io
          path: ${{ env.HOMEPAGE_REPO_PATH }}
          token: ${{ secrets.ONNELAKIN_GITHUB_PAGES_TOKEN || github.token }}

      - name: Configure Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ env.HOMEPAGE_REPO_PATH }}/package-lock.json

      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install homepage dependencies
        working-directory: ${{ env.HOMEPAGE_REPO_PATH }}
        run: |
          set -euo pipefail
          npm ci

      - name: Validate
        run: |
          set -euo pipefail
          python3 scripts/validate_topics.py
          python3 scripts/validate_apps_registry.py
          python3 scripts/validate_app_release_config.py
          python3 scripts/validate_android_store_versions.py
          python3 scripts/validate_app_releases.py
          python3 scripts/validate_foundation.py

      - name: Check App Store Versions
        if: env.DRY_RUN != 'true'
        run: |
          set -euo pipefail
          python3 scripts/check_store_versions.py

      - name: Check App Store Versions Dry Run
        if: env.DRY_RUN == 'true'
        run: |
          set -euo pipefail
          python3 scripts/check_store_versions.py --dry-run

      - name: Prepare App Release Candidates
        if: env.DRY_RUN != 'true'
        run: |
          set -euo pipefail
          python3 scripts/prepare_app_release_rows.py
          python3 scripts/fill_ready_app_releases.py
          python3 scripts/validate_app_releases.py

      - name: Prepare App Release Candidates Dry Run
        if: env.DRY_RUN == 'true'
        run: |
          set -euo pipefail
          python3 scripts/prepare_app_release_rows.py --dry-run
          python3 scripts/fill_ready_app_releases.py --dry-run

      - name: Create GitHub App Releases
        if: env.DRY_RUN != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ONNELLAB_RELEASE_TOKEN: ${{ secrets.ONNELLAB_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          python3 scripts/create_github_releases.py

      - name: Create GitHub App Releases Dry Run
        if: env.DRY_RUN == 'true'
        run: |
          set -euo pipefail
          python3 scripts/create_github_releases.py --dry-run

      - name: Generate App Release Report
        if: env.DRY_RUN != 'true'
        run: |
          set -euo pipefail
          python3 scripts/generate_app_release_report.py

      - name: Generate App Release Report Dry Run
        if: env.DRY_RUN == 'true'
        run: |
          set -euo pipefail
          python3 scripts/generate_app_release_report.py --output /tmp/onnel-content-engine-app-releases.md

      - name: Sync App Release Attention Issue
        if: env.DRY_RUN != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 scripts/sync_app_release_issue.py

      - name: Sync App Release Attention Issue Dry Run
        if: env.DRY_RUN == 'true'
        run: |
          set -euo pipefail
          python3 scripts/sync_app_release_issue.py --report /tmp/onnel-content-engine-app-releases.md --dry-run

      - name: Prepare Dry Run Workspace
        if: env.DRY_RUN == 'true'
        run: |
          set -euo pipefail
          rm -rf /tmp/onnel-content-engine-dry-run
          mkdir -p /tmp/onnel-content-engine-dry-run
          cp -R data topics templates generated /tmp/onnel-content-engine-dry-run/

      - name: Generate Markdown
        if: env.DRY_RUN != 'true'
        run: |
          set -euo pipefail
          python3 scripts/generate_all_markdown.py

      - name: Generate Markdown Dry Run
        if: env.DRY_RUN == 'true'
        run: |
          set -euo pipefail
          python3 scripts/generate_all_markdown.py \
            --topics /tmp/onnel-content-engine-dry-run/data/topics.csv \
            --apps /tmp/onnel-content-engine-dry-run/data/apps_registry.csv \
            --output-root /tmp/onnel-content-engine-dry-run/generated/markdown \
            --legacy-topics /tmp/onnel-content-engine-dry-run/topics/topics.csv

      - name: Generate Image Specifications
        if: env.DRY_RUN != 'true'
        run: |
          set -euo pipefail
          python3 scripts/generate_all_image_specs.py

      - name: Generate Image Specifications Dry Run
        if: env.DRY_RUN == 'true'
        run: |
          set -euo pipefail
          python3 scripts/generate_all_image_specs.py \
            --topics /tmp/onnel-content-engine-dry-run/data/topics.csv \
            --apps /tmp/onnel-content-engine-dry-run/data/apps_registry.csv \
            --output-root /tmp/onnel-content-engine-dry-run/generated/images \
            --legacy-topics /tmp/onnel-content-engine-dry-run/topics/topics.csv

      - name: Generate Image Assets
        if: env.DRY_RUN != 'true'
        run: |
          set -euo pipefail
          python3 scripts/generate_all_image_assets.py

      - name: Generate Image Assets Dry Run
        if: env.DRY_RUN == 'true'
        run: |
          set -euo pipefail
          python3 scripts/generate_all_image_assets.py \
            --topics /tmp/onnel-content-engine-dry-run/data/topics.csv \
            --images-root /tmp/onnel-content-engine-dry-run/generated/images \
            --assets-root /tmp/onnel-content-engine-dry-run/generated/assets/blog \
            --legacy-topics /tmp/onnel-content-engine-dry-run/topics/topics.csv

      - name: Generate Internal Links
        if: env.DRY_RUN != 'true'
        run: |
          set -euo pipefail
          python3 scripts/generate_all_internal_links.py

      - name: Generate Internal Links Dry Run
        if: env.DRY_RUN == 'true'
        run: |
          set -euo pipefail
          python3 scripts/generate_all_internal_links.py \
            --topics /tmp/onnel-content-engine-dry-run/data/topics.csv \
            --apps /tmp/onnel-content-engine-dry-run/data/apps_registry.csv \
            --output-root /tmp/onnel-content-engine-dry-run/generated/metadata

      - name: Evaluate Articles
        if: env.DRY_RUN != 'true'
        run: |
          set -euo pipefail
          python3 scripts/evaluate_all_articles.py

      - name: Evaluate Articles Dry Run
        if: env.DRY_RUN == 'true'
        run: |
          set -euo pipefail
          python3 scripts/evaluate_all_articles.py \
            --topics /tmp/onnel-content-engine-dry-run/data/topics.csv \
            --metadata-root /tmp/onnel-content-engine-dry-run/generated/metadata \
            --assets-root /tmp/onnel-content-engine-dry-run/generated/assets/blog \
            --review-root /tmp/onnel-content-engine-dry-run/generated/reviews

      - name: Schedule Ready Articles
        if: env.DRY_RUN != 'true'
        run: |
          set -euo pipefail
          python3 scripts/schedule_ready_articles.py --threshold 9.0 --interval-days 3 --publication-time 09:00

      - name: Schedule Ready Articles Dry Run
        if: env.DRY_RUN == 'true'
        run: |
          set -euo pipefail
          python3 scripts/schedule_ready_articles.py \
            --topics /tmp/onnel-content-engine-dry-run/data/topics.csv \
            --review-root /tmp/onnel-content-engine-dry-run/generated/reviews \
            --legacy-topics /tmp/onnel-content-engine-dry-run/topics/topics.csv \
            --threshold 9.0 \
            --interval-days 3 \
            --publication-time 09:00

      - name: Publish Due Articles
        if: env.DRY_RUN != 'true'
        run: |
          set -euo pipefail
          python3 scripts/publish_due_articles.py --threshold 9.0 --site-url "$SITE_URL" --limit 1

      - name: Publish Due Articles Dry Run
        if: env.DRY_RUN == 'true'
        run: |
          set -euo pipefail
          python3 scripts/publish_due_articles.py \
            --topics /tmp/onnel-content-engine-dry-run/data/topics.csv \
            --review-root /tmp/onnel-content-engine-dry-run/generated/reviews \
            --legacy-topics /tmp/onnel-content-engine-dry-run/topics/topics.csv \
            --threshold 9.0 \
            --site-url "$SITE_URL" \
            --limit 1

      - name: Build
        if: env.DRY_RUN != 'true'
        run: |
          set -euo pipefail
          python3 scripts/build_site.py --site-url "$SITE_URL"

      - name: Build Dry Run
        if: env.DRY_RUN == 'true'
        run: |
          set -euo pipefail
          python3 scripts/build_site.py \
            --topics /tmp/onnel-content-engine-dry-run/data/topics.csv \
            --site-dir /tmp/onnel-content-engine-dry-run/generated/html \
            --site-url "$SITE_URL"

      - name: Generate Distribution Drafts
        if: env.DRY_RUN != 'true'
        run: |
          set -euo pipefail
          python3 scripts/generate_social_posts.py --site-url "$SITE_URL"
          python3 scripts/generate_syndication_drafts.py --site-url "$SITE_URL"

      - name: Generate Distribution Drafts Dry Run
        if: env.DRY_RUN == 'true'
        run: |
          set -euo pipefail
          python3 scripts/generate_social_posts.py \
            --topics /tmp/onnel-content-engine-dry-run/data/topics.csv \
            --output-dir /tmp/onnel-content-engine-dry-run/generated/social \
            --site-url "$SITE_URL"
          python3 scripts/generate_syndication_drafts.py \
            --topics /tmp/onnel-content-engine-dry-run/data/topics.csv \
            --output-dir /tmp/onnel-content-engine-dry-run/generated/syndication \
            --site-url "$SITE_URL"

      - name: Approve Due Core Distribution
        if: env.DRY_RUN != 'true'
        run: |
          set -euo pipefail
          python3 scripts/approve_due_distribution.py --approved-by github-actions

      - name: Approve Due Core Distribution Dry Run
        if: env.DRY_RUN == 'true'
        run: |
          set -euo pipefail
          python3 scripts/approve_due_distribution.py \
            --topics /tmp/onnel-content-engine-dry-run/data/topics.csv \
            --social-manifest /tmp/onnel-content-engine-dry-run/generated/social/manifest.json \
            --syndication-manifest /tmp/onnel-content-engine-dry-run/generated/syndication/manifest.json \
            --approved-by github-actions \
            --dry-run

      - name: Commit Content Engine Outputs
        if: env.DRY_RUN != 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p generated/assets generated/metadata generated/reviews generated/html
          git add data/topics.csv data/app_releases.csv data/app_release_config.csv data/store_versions.csv topics/topics.csv generated/markdown generated/images generated/assets generated/metadata generated/reports generated/reviews generated/html generated/social generated/syndication
          if git diff --cached --quiet; then
            echo "No content engine changes to commit"
          else
            git commit -m "Run scheduled publishing automation"
            git push origin HEAD:main
          fi

      - name: Deploy Dry Run
        if: env.DRY_RUN == 'true'
        run: |
          set -euo pipefail
          python3 scripts/deploy_github_pages.py \
            --topics /tmp/onnel-content-engine-dry-run/data/topics.csv \
            --homepage-repo "$HOMEPAGE_REPO_PATH" \
            --dry-run

      - name: Deploy
        if: env.DRY_RUN != 'true'
        env:
          PAGES_TOKEN: ${{ secrets.ONNELAKIN_GITHUB_PAGES_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${PAGES_TOKEN:-}" ]; then
            echo "ONNELAKIN_GITHUB_PAGES_TOKEN is required for deployment" >&2
            exit 1
          fi
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python3 scripts/deploy_github_pages.py \
            --homepage-repo "$HOMEPAGE_REPO_PATH" \
            --branch main

      - name: Post Due Core Distribution
        id: post_core_distribution
        if: env.DRY_RUN != 'true'
        continue-on-error: true
        env:
          X_CLIENT_ID: ${{ secrets.X_CLIENT_ID }}
          X_CLIENT_SECRET: ${{ secrets.X_CLIENT_SECRET }}
          X_REFRESH_TOKEN: ${{ secrets.X_REFRESH_TOKEN }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: |
          set -euo pipefail
          python3 scripts/post_core_distribution.py

      - name: Commit Distribution Posting Status
        if: env.DRY_RUN != 'true' && always()
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/social/manifest.json generated/syndication/manifest.json
          if git diff --cached --quiet; then
            echo "No distribution posting status changes to commit"
          else
            git commit -m "Update distribution posting status"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Fail On Core Distribution Posting Error
        if: env.DRY_RUN != 'true' && steps.post_core_distribution.outcome == 'failure'
        run: |
          set -euo pipefail
          echo "Core distribution posting failed; manifest status was committed when possible" >&2
          exit 1
